name: Build ForgeWorkout APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        continue-on-error: true
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew clean assembleRelease --stacktrace --warning-mode all 2>&1 | tee ../build.log

      - name: Extract Errors
        if: always()
        run: |
          grep -Ei \
          "FAILURE:|BUILD FAILED|BUILD SUCCESSFUL|Execution failed|Exception|Error:|Caused by:|> Task .* FAILED|Process .* finished with non-zero exit value|Could not|Cannot find module|A problem occurred|What went wrong" \
          build.log > errors.log || true

      - name: Build Summary
        if: always()
        run: |
          {
            echo "===== BUILD SUMMARY ====="
            echo
            grep -E "BUILD SUCCESSFUL|BUILD FAILED|FAILURE:" build.log || true
            echo
            echo "===== FAILED TASKS ====="
            grep -E "> Task .*FAILED" build.log || true
            echo
            echo "===== EXCEPTIONS ====="
            grep -E "Execution failed|Exception|Caused by:" build.log || true
          } > summary.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ForgeWorkout-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ForgeWorkout-build-logs
          path: |
            build.log
            errors.log
            summary.txt

      - name: Fail if build failed
        run: |
          grep -q "BUILD SUCCESSFUL" build.log
